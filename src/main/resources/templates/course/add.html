<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students</title>
</head>
<body>
<form th:action="@{/courses/create}" method="post">
    <label for="name">Name:
        <input id="name" type="text" name="name">
    </label><br/>
    <label for="trainers">Trainers:</label>
    <div id="trainers" th:each="trainer : ${trainers}">
        <input type="checkbox" name="trainerIds"
               th:value="${trainer.id}"/>
        <span th:text="|${trainer.firstname} ${trainer.secondname}|"/>
        <br/>
    </div>
    <button type="submit">Create</button>
</form>
</body>
</html>
